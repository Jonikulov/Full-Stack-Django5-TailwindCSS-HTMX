<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Units</title>
  <style>
    body {
      margin: 0;
    }
    div {
      font-size: 15px;
    }
    #target {
      font-size: 1.2rem;
    }
    #target-p {
      font-size: 2em;
    }

    div.container {
      background-color: coral;
      width: 50vw;
      height: 50px;
    }

    div.outer {
      background-color: limegreen;
      width: 100%;
      height: 100px;
    }
    div.inner {
      background-color: crimson;
      width: 50vw;
      height: 50px;
    }
  </style>
</head>


<body>
  <p>This is a paragraph.</p>
  <p id="target">This is another paragraph.</p>

  <div class="paragraph">
    <p id="target-p">This paragraph is inside a div.</p>
  </div>
  <hr>
  <div class="container"></div>
  <div class="container"></div>
  <hr>
  <div class="outer">
    <div class="inner"></div>
  </div>

</body>
</html>
