<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Box Model</title>
  <style>
    .box {
      width: 100px;
      height: 100px;
      background-color: lightsteelblue;
      margin-bottom: 10px;
    }
    p {
      background-color: bisque;
      padding: 15px;
      border: 2px solid crimson;
      margin: 25px;
    }
  </style>
</head>

<body>

  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>

  <hr>

  <p>Let's take a paragraph...</p>
  <p>Let's take another paragraph...</p>

</body>
</html>
