<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro to CSS</title>
  <!-- <link rel="stylesheet" href="style.css"> -->
  <style>
    p {
      color:brown;
      font-size: 20px;
    }
    .xl {
      font-size: 25px;
    }
    #unique {
      text-decoration: underline;
    }
    input[type="text"] {
      color: limegreen;
    }
  </style>
</head>

<body>
  <p>This is a paragraph.</p>
  <p class="xl">This is another paragraph.</p>
  <p class="xl" id="unique">This is a paragraph with an ID.</p>

  <input type="text" name="first_name" value="John" style="color: blue;" />
  <input type="password" name="password">
</body>

</html>
