name: django-blog-project
services:
  db:
    image: postgres:18-trixie
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      interval: 2s
      timeout: 10s
      retries: 5
      start_period: 30s
  web:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - DEBUG=True  # Overrides the .env for local dev
    volumes:  # Development mode only
      - .:/app  # Sync code for live-reloading
      - /app/.venv  # Protect container venv
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data:
