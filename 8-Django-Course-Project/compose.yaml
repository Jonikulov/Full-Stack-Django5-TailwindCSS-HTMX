name: django-blog-project
services:
  db:
    image: postgres:18-trixie
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      interval: 2s
      timeout: 10s
      retries: 5
      start_period: 30s
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: django_blog_web
    init: true
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:  # Overrides the .env for local dev
      - DEBUG=True
    develop:  # development mode only
      watch:
        - action: sync
          path: .
          target: /app
          # ignore:
          #   - .venv/
          #   - staticfiles/
        - action: rebuild
          path: ./pyproject.toml
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data:
