name: Production Deployment

on:
  push:
    branches: [ "main" ] # Only runs when you merge to main

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub

      - name: Build and Push (Stops if tests fail!)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production  # Tell Docker to stop after Stage 3
          push: true
          tags: ghcr.io/yourgithubname/yourproject:latest

  deploy-to-vps:
    needs: build-test-push # Won't run unless the build & tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Execute Deployment Commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/your/project/on/vps
            
            # 1. Download the new "Frozen" Image
            docker compose pull web
            
            # 2. THE SENIOR FIX: The One-Off Migration
            # This creates a temporary container just to upgrade the DB, then deletes itself.
            docker compose run --rm web python src/manage.py migrate --noinput
            
            # 3. THE ROLLOUT
            # Recreate the web containers with the new image. 
            # --no-deps ensures we don't accidentally restart the database container.
            docker compose up -d --no-deps web
            
            # 4. Clean up old images to save disk space on your VPS
            docker image prune -f
