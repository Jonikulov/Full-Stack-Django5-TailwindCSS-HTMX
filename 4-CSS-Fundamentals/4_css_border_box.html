<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Border Box</title>
  <style>
    * {
      box-sizing: border-box;
    }
    .container {
      background-color: limegreen;
      padding: 5px;
    }
    .item {
      background-color: crimson;
      width: 100%;
      height: 50px;
      border: 5px solid black;
    }
    .box {
      background-color: coral;
      width: 300px;
      height: 300px;
      padding: 20px;
      border: 5px solid;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="item"></div>
  </div>
  <hr>
  <div class="box"></div>
</body>
</html>
