<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .emphasis {
      font-style: italic;
    }
    footer {
      display: flex;
    }
    footer div {
      padding: 15px;
      border: 1px solid gray;
    }
    footer div a {
      display: block;
    }
  </style>
  <title>Document</title>
</head>


<body>
  <div>You can put text inside a div!</div>
  <p>Does it make more sense inside a p?</p>

  <p>
    You can <span class="emphasis">emphasize</span> text with a span.
    But maybe you should use an <em>em</em>? Unless it's purely decorative,
    in which case span is correct!
  </p>

  <footer>
    <div>
      <a href="example.com">Link 1</a>
      <a href="example.com">Link 2</a>
    </div>
    <div>
      <a href="example.com">Link 3</a>
      <a href="example.com">Link 4</a>
    </div>
  </footer>

</body>


</html>
