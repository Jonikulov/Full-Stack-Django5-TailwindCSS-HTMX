<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS grid placement</title>
  <style>
    .grid-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 100px);
    }

    .grid-container * {
      background-color: crimson;
      border: 1px solid black;
    }

    .big {
      grid-column: 3;  /* -1 will be the last one inclusive */
      grid-row: 1 / 3;  /* 3 is not included */
    }

    .bigger {
      grid-row: 3;
      /* where it should start & how many columns it should span: */
      grid-column: 2 / span 2;
    }

    .biggest {
      /* how many columns it should span & where it should end: */
      grid-column: span 3 / -1;
      grid-row: 4 / span 5;
      /* NOTE: we cannot use negative values with `span` */
    }

    .bigger-3 {
       /* 'grid-row-start', 'grid-column-start', 'grid-row-end', 'grid-column-end' */
      grid-area: 3 / 4 / 3 / -1;
    }
  </style>
</head>

<body>
  <div class="grid-container">
    <div class="item">1</div>
    <div class="item big">2</div>
    <div class="item bigger">3</div>
    <div class="item bigger-3">33</div>
    <div class="item biggest">4</div>
  </div>
</body>
</html>
