<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colors in CSS</title>
  <style>
    h1 {
      color: #ffaa55;
    }
    h1 {
      color: #ffaa55cc;
    }
    h1 {
      color: rgb(255, 0, 0);
    }
    h1 {
      color: rgba(255, 0, 0, 0.3);
    }
    h1 {
      color: hsl(44, 90%, 53%);
    }

    div.bg-image {
      background-image: url('https://media.istockphoto.com/id/2018101881/photo/ramadan-kareem-photography-lantern-with-crescent-moon-shape-on-the-beach.jpg?s=612x612&w=0&k=20&c=smrH2rAlHH3wkflwk7kQrKRfvQXYKmOf8NEhYpfxL8I=');
      aspect-ratio: 16/9;
    }

    div.gradient {
      width: 500px;
      height: 50px;
      background-image: linear-gradient(to right, red, blue);
    }

    div.gradient-pct {
      width: 500px;
      height: 50px;
      background-image: linear-gradient(to right, red, orange 40%, blue 100%);
    }
  </style>
</head>
<body>
  <h1>Marhaba Ya Shahra Ramadan! (this is colored text)</h1>
  <div class="bg-image"></div>
  <br>
  <div class="gradient"></div>
  <br>
  <div class="gradient-pct"></div>
  <br>
</body>
</html>
